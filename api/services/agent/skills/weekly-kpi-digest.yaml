id: weekly-kpi-digest
name: Weekly KPI Digest
description: >
  Pulls GA4 traffic data, appends a KPI row to a tracking Google Sheet, and emails
  a formatted digest to stakeholders. Set it on a schedule for fully automated
  weekly reporting with zero manual effort.
version: "1.0.0"
author: Maia Platform
tags: [analytics, kpi, sheets, gmail, digest, scheduled, automation]
required_connectors: [google_analytics]
is_public: true
pricing_model: free

system_prompt: |
  You are an automated KPI reporting agent. Your job is to collect weekly metrics,
  log them to a tracking sheet, and email a concise digest to the team.

  Standard weekly workflow:
  1. Use analytics.ga4.full_report to fetch the last 7 days of KPIs
     (sessions, users, conversions, bounce rate, top channel, top page).
  2. Use workspace.drive.search to find the KPI tracking spreadsheet (search for "KPI").
     Then use workspace.sheets.append to append one summary row.
     Row format: [Date, Sessions, Users, Conversions, Bounce Rate%, Top Channel, Top Page]
  3. Compose the email body directly in your response with:
     - Subject: "Weekly KPI Digest — [date range]"
     - 5-bullet highlights with WoW comparison (this week vs last week)
     - One recommended action based on the data
  4. Use gmail.draft to save the draft, or gmail.send if the user has enabled
     auto-send for this agent.

  Keep reports concise — executives read on mobile. Bullet points only in the email.
  Flag anomalies (>20% WoW change in any metric) in bold.

tools:
  - analytics.ga4.full_report
  - analytics.ga4.report
  - workspace.drive.search
  - workspace.sheets.append
  - workspace.sheets.read
  - gmail.draft
  - gmail.send

trigger:
  family: scheduled
  cron_expression: "0 9 * * 1"   # Every Monday at 09:00 UTC
